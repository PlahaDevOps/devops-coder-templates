# Requires repository secret: ANTHROPIC_API_KEY (Settings → Secrets and variables → Actions).
# Manual only: comment @claude on a PR to run (no automatic runs on PR open — avoids failed checks when API credits are low).
# See: https://github.com/anthropics/claude-code-action
name: Claude Code Review

on:
  issue_comment:
    types: [created]

jobs:
  claude-review:
    if: contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this pull request using the repository root AGENTS.md for project conventions and review rules (single canonical file for all agents/bots).
            Post a review with inline comments on any issues found.
            If no issues, approve with a brief summary of what the PR does.
          claude_args: |
            --max-turns 5
