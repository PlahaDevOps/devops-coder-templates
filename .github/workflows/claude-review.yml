# Requires repository secret: ANTHROPIC_API_KEY (Settings → Secrets and variables → Actions).
# See: https://github.com/anthropics/claude-code-action and https://docs.anthropic.com/en/docs/claude-code/github-actions
# v1 uses `prompt` (replaces deprecated `direct_prompt`); use `claude_args` for `--max-turns` (replaces deprecated `max_turns`).
name: Claude Code Review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]
  issue_comment:
    types: [created]

jobs:
  claude-review:
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this pull request using the repository root AGENTS.md for project conventions and review rules (single canonical file for all agents/bots).
            Post a review with inline comments on any issues found.
            If no issues, approve with a brief summary of what the PR does.
          claude_args: |
            --max-turns 5
