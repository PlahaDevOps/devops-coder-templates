# Runner: same as deploy-coder-aws.yml (self-hosted on AWS EC2 Ubuntu, x64).
name: Auto Label

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  label:
    name: Label PR
    # GitHub Actions self-hosted runner on AWS EC2 (Ubuntu); register under repo Settings → Actions → Runners.
    runs-on: [self-hosted, linux, X64]
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          configuration-path: .github/labeler.yml
