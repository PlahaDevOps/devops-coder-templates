# Runs on every PR targeting main (no paths filter — otherwise PRs that only touch README/docker-compose/etc. skip checks).
# Results appear in the Checks tab only (no PR conversation comments).
name: PR Checks

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  TFSEC_VERSION: "1.28.13"

jobs:
  terraform-validate:
    name: Validate Terraform (${{ matrix.template }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        template: [docker-dev, k8s-dev]

    defaults:
      run:
        working-directory: ./coder-templates/${{ matrix.template }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Check Terraform installed
        run: terraform --version

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init -backend=false

      - name: Terraform Validate
        id: validate
        run: terraform validate

      - name: tfsec Security Scan
        id: tfsec
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/aquasecurity/tfsec/releases/download/v${TFSEC_VERSION}/tfsec-linux-amd64" -o "${RUNNER_TEMP}/tfsec"
          chmod +x "${RUNNER_TEMP}/tfsec"
          "${RUNNER_TEMP}/tfsec" . --soft-fail --format markdown
        continue-on-error: true
