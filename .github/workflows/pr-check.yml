# Runs on every PR targeting main (no paths filter — otherwise PRs that only touch README/docker-compose/etc. skip checks).
name: PR Checks

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  terraform-validate:
    name: Validate Terraform (${{ matrix.template }})
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        template: [docker-dev, k8s-dev]

    defaults:
      run:
        shell: powershell
        working-directory: ./coder-templates/${{ matrix.template }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Self-hosted Windows: use Terraform on PATH (skip hashicorp/setup-terraform — unreliable here).
      - name: Check Terraform installed
        run: terraform --version

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init -backend=false

      - name: Terraform Validate
        id: validate
        run: terraform validate

      - name: tfsec Security Scan
        id: tfsec
        run: |
          $ErrorActionPreference = "Stop"
          $url = "https://github.com/aquasecurity/tfsec/releases/latest/download/tfsec-windows-amd64.exe"
          Invoke-WebRequest -Uri $url -OutFile "$env:RUNNER_TEMP\tfsec.exe" -UseBasicParsing
          & "$env:RUNNER_TEMP\tfsec.exe" . --soft-fail --format markdown
        continue-on-error: true

      - name: Comment tfsec Results
        uses: actions/github-script@v7
        if: always() && github.event_name == 'pull_request'
        env:
          TFSEC_OUTCOME: ${{ steps.tfsec.outcome }}
          TEMPLATE: ${{ matrix.template }}
        with:
          script: |
            const tfsec = process.env.TFSEC_OUTCOME;
            const t = process.env.TEMPLATE;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🔐 Security Scan (tfsec) — \`${t}\`\n\n${tfsec === 'success' ? '✅ No security issues found!' : '⚠️ Security issues detected — check logs'}`,
            });

      - name: Comment PR
        uses: actions/github-script@v7
        if: always() && github.event_name == 'pull_request'
        env:
          FMT_OUTCOME: ${{ steps.fmt.outcome }}
          VALIDATE_OUTCOME: ${{ steps.validate.outcome }}
          INIT_OUTCOME: ${{ steps.init.outcome }}
          TEMPLATE: ${{ matrix.template }}
        with:
          script: |
            const fmt = process.env.FMT_OUTCOME;
            const validate = process.env.VALIDATE_OUTCOME;
            const init = process.env.INIT_OUTCOME;
            const t = process.env.TEMPLATE;
            const fmtOk = fmt === 'success';
            const valOk = validate === 'success';
            const initOk = init === 'success';
            const body = `## Terraform PR check results — \`${t}\`

            | Check | Status |
            |-------|--------|
            | Init | ${initOk ? 'Passed' : 'Failed'} |
            | Format (\`terraform fmt -check\`) | ${fmtOk ? 'Passed' : 'Needs formatting — run \`terraform fmt -recursive\` locally'} |
            | Validate | ${valOk ? 'Passed' : 'Failed'} |

            ${!fmtOk ? '> Fix formatting before merge, or run `terraform fmt -recursive` in `coder-templates/' + t + '`.' : ''}
            ${valOk && fmtOk && initOk ? '> All checks passed for this template. Ready for review.' : ''}
            `;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
