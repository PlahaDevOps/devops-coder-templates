# Runs on PRs to main when coder-templates change: terraform fmt + validate, comment on PR.
name: PR Checks

on:
  pull_request:
    branches: [main]
    paths:
      - "coder-templates/**"

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  terraform-validate:
    name: Validate Terraform
    runs-on: self-hosted

    defaults:
      run:
        shell: powershell
        working-directory: ./coder-templates/docker-dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Native download: hashicorp/setup-terraform often throws AggregateError on Windows
      # self-hosted runners (Node fetch / TLS / proxy). Same pattern as Coder CLI in deploy-template.yml.
      - name: Install Terraform
        shell: powershell
        working-directory: ${{ github.workspace }}
        run: |
          $ErrorActionPreference = 'Stop'
          $version = '1.14.8'
          $zipName = "terraform_${version}_windows_amd64.zip"
          $baseUrl = "https://releases.hashicorp.com/terraform/${version}"
          $dest = Join-Path $env:RUNNER_TEMP "terraform-$version"
          $bin = Join-Path $dest 'bin'
          New-Item -ItemType Directory -Force -Path $bin | Out-Null
          $zipPath = Join-Path $dest $zipName
          Invoke-WebRequest -Uri "$baseUrl/$zipName" -OutFile $zipPath -UseBasicParsing
          Expand-Archive -LiteralPath $zipPath -DestinationPath $bin -Force
          Add-Content -Path $env:GITHUB_PATH -Value $bin
          terraform version

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init -backend=false

      - name: Terraform Validate
        id: validate
        run: terraform validate

      - name: Comment PR
        uses: actions/github-script@v7
        if: always() && github.event_name == 'pull_request'
        env:
          FMT_OUTCOME: ${{ steps.fmt.outcome }}
          VALIDATE_OUTCOME: ${{ steps.validate.outcome }}
          INIT_OUTCOME: ${{ steps.init.outcome }}
        with:
          script: |
            const fmt = process.env.FMT_OUTCOME;
            const validate = process.env.VALIDATE_OUTCOME;
            const init = process.env.INIT_OUTCOME;
            const fmtOk = fmt === 'success';
            const valOk = validate === 'success';
            const initOk = init === 'success';
            const body = `## Terraform PR check results

            | Check | Status |
            |-------|--------|
            | Init | ${initOk ? 'Passed' : 'Failed'} |
            | Format (\`terraform fmt -check\`) | ${fmtOk ? 'Passed' : 'Needs formatting — run \`terraform fmt -recursive\` locally'} |
            | Validate | ${valOk ? 'Passed' : 'Failed'} |

            ${!fmtOk ? '> Fix formatting before merge, or run `terraform fmt -recursive` in `coder-templates/docker-dev`.' : ''}
            ${valOk && fmtOk && initOk ? '> All checks passed. Ready for review.' : ''}
            `;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
