# On push to main, push the docker-dev template to your Coder deployment (requires CODER_URL + CODER_TOKEN secrets).
# Self-hosted runner: use a Windows machine on your network so CODER_URL can be localhost/LAN (see .github/self-hosted-runner.md).
name: Deploy Coder Template

on:
  push:
    branches: [main]
    paths:
      - "coder-templates/**"

env:
  # Pin CLI major line to your Coder server; bump when you upgrade the server.
  CODER_CLI_VERSION: "2.31.7"

jobs:
  deploy:
    name: Deploy template to Coder
    runs-on: self-hosted

    defaults:
      run:
        # Use Windows PowerShell 5.1+ (built in). Some machines lack `pwsh` (PowerShell 7).
        shell: powershell

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Runner diagnostics
        run: |
          Write-Host "Runner name: $env:RUNNER_NAME"
          Write-Host "Runner OS: $env:RUNNER_OS"
          Write-Host "PSVersion:" $PSVersionTable.PSVersion
          git --version

      # Each job run executes steps from scratch; GITHUB_PATH is per-job. Skip the download when the
      # runner already has a matching Coder CLI (e.g. winget install Coder.Coder --version 2.31.7).
      - name: Install Coder CLI (if missing or wrong version)
        run: |
          $ErrorActionPreference = "Stop"
          $ver = $env:CODER_CLI_VERSION
          $cmd = Get-Command coder -ErrorAction SilentlyContinue
          if ($cmd) {
            $first = (coder version 2>&1 | Select-Object -First 1) -as [string]
            if ($first -match [regex]::Escape($ver)) {
              Write-Host ('Coder CLI {0} already available at {1} - skipping download.' -f $ver, $cmd.Source)
              exit 0
            }
            Write-Host ('Found coder but version line does not match {0} : {1}' -f $ver, $first)
          }
          $dest = Join-Path $env:RUNNER_TEMP ('coder-cli-{0}' -f $ver)
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          $zip = Join-Path $env:RUNNER_TEMP ('coder_windows_{0}.zip' -f $ver)
          $url = ('https://github.com/coder/coder/releases/download/v{0}/coder_{0}_windows_amd64.zip' -f $ver)
          Write-Host ('Downloading {0}' -f $url)
          Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing
          Expand-Archive -Path $zip -DestinationPath $dest -Force
          Add-Content $env:GITHUB_PATH $dest

      - name: Login and push template
        env:
          CODER_URL: ${{ secrets.CODER_URL }}
          CODER_TOKEN: ${{ secrets.CODER_TOKEN }}
        run: |
          coder version
          coder login $env:CODER_URL --token $env:CODER_TOKEN
          coder templates push docker-dev `
            --directory ./coder-templates/docker-dev `
            --yes
