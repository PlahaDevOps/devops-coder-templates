# Run from this directory: docker compose up -d --force-recreate
# Loads GITHUB_* from .env for login OAuth and external (Git) auth.
#
# GitHub OAuth app must allow BOTH callback URLs (add a second OAuth app on GitHub
# if your provider only allows one URL):
#   Login:    http://localhost:3000/api/v2/users/oauth2/github/callback
#   Git/CLI:  http://localhost:3000/external-auth/github/callback

services:
  coder:
    image: ghcr.io/coder/coder:latest
    container_name: coder
    restart: unless-stopped
    privileged: true
    ports:
      - "3000:3000"
    environment:
      CODER_ACCESS_URL: http://localhost:3000
      CODER_HTTP_ADDRESS: 0.0.0.0:3000
      CODER_OAUTH2_GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      CODER_OAUTH2_GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      CODER_OAUTH2_GITHUB_ALLOW_SIGNUPS: "true"
      CODER_OAUTH2_GITHUB_ALLOW_EVERYONE: "true"
      # Workspace Git HTTPS + repo access (External Auth)
      CODER_EXTERNAL_AUTH_0_ID: "github"
      CODER_EXTERNAL_AUTH_0_TYPE: "github"
      CODER_EXTERNAL_AUTH_0_CLIENT_ID: "${GITHUB_CLIENT_ID}"
      CODER_EXTERNAL_AUTH_0_CLIENT_SECRET: "${GITHUB_CLIENT_SECRET}"
      CODER_EXTERNAL_AUTH_0_DISPLAY_NAME: "GitHub"
      CODER_EXTERNAL_AUTH_0_SCOPES: "repo read:org"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./coder-data:/home/coder/.config
