# Secrets come from .env (gitignored). Do not put real tokens in git.
# Fill NGROK_DOMAIN + CODER_ACCESS_URL after you reserve a static domain in ngrok dashboard.

services:
  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok
    restart: unless-stopped
    # ngrok v3: use --url (not deprecated --domain). Hostname-only NGROK_DOMAIN → full https URL.
    # Note: free-tier browser warning is decided at ngrok’s edge; you cannot fix CLI/API clients by
    # adding headers only on the tunnel → Coder hop — see README “ngrok free tier”.
    command:
      - http
      - --url=https://${NGROK_DOMAIN}
      - coder:3000
    environment:
      NGROK_AUTHTOKEN: "${NGROK_AUTH_TOKEN}"
    ports:
      - "4040:4040"

  coder:
    image: ghcr.io/coder/coder:latest
    container_name: coder
    restart: unless-stopped
    # Docker API via TCP (no docker.sock mount). Enable Docker Desktop → "Expose daemon on tcp://localhost:2375".
    privileged: true
    depends_on:
      - ngrok
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DOCKER_HOST: "${DOCKER_HOST:-tcp://host.docker.internal:2375}"
      CODER_ACCESS_URL: "${CODER_ACCESS_URL}"
      CODER_HTTP_ADDRESS: "0.0.0.0:3000"
      # GitHub OAuth app "Coder Local" — sign-in (callback …/api/v2/users/oauth2/github/callback)
      CODER_OAUTH2_GITHUB_CLIENT_ID: "${GITHUB_CLIENT_ID}"
      CODER_OAUTH2_GITHUB_CLIENT_SECRET: "${GITHUB_CLIENT_SECRET}"
      CODER_OAUTH2_GITHUB_ALLOW_SIGNUPS: "true"
      CODER_OAUTH2_GITHUB_ALLOW_EVERYONE: "true"
      # GitHub OAuth app "Coder Local External" — git/external auth (callback …/external-auth/github/callback)
      CODER_EXTERNAL_AUTH_0_ID: "github"
      CODER_EXTERNAL_AUTH_0_TYPE: "github"
      CODER_EXTERNAL_AUTH_0_CLIENT_ID: "${GITHUB_EXTERNAL_CLIENT_ID}"
      CODER_EXTERNAL_AUTH_0_CLIENT_SECRET: "${GITHUB_EXTERNAL_CLIENT_SECRET}"
      CODER_EXTERNAL_AUTH_0_DISPLAY_NAME: "GitHub"
      CODER_EXTERNAL_AUTH_0_SCOPES: "repo read:org"
    volumes:
      - ./coder-data:/home/coder/.config
      # Kubernetes template (coder-templates/k8s-dev): provisioner reads ~/.kube/config inside this container.
      # Set KUBECONFIG_HOST_PATH in .env (see .env.example). Use forward slashes on Windows, e.g. C:/Users/you/.kube
      - "${KUBECONFIG_HOST_PATH:-C:/Users/admin/.kube}:/home/coder/.kube:ro"
